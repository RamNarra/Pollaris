# apphosting.yaml — Firebase App Hosting configuration
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 10
  concurrency: 80

env:
  # Firebase Client SDK (public — safe to include)
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: "SCRUBBED_API_KEY"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "pollaris-497520.firebaseapp.com"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "pollaris-497520"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: "pollaris-497520.firebasestorage.app"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "803271817886"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:803271817886:web:f075e289aad25e5ae7998f"
    availability:
      - BUILD
      - RUNTIME

  # Sensitive keys — stored in Secret Manager
  # Run: npx firebase-tools@latest apphosting:secrets:set FIREBASE_PRIVATE_KEY
  - variable: FIREBASE_PROJECT_ID
    value: "pollaris-497520"
    availability:
      - RUNTIME
  - variable: FIREBASE_CLIENT_EMAIL
    value: "pollaris-agent@pollaris-497520.iam.gserviceaccount.com"
    availability:
      - RUNTIME
  - variable: FIREBASE_PRIVATE_KEY
    secret: FIREBASE_PRIVATE_KEY
    availability:
      - RUNTIME
  - variable: GEMINI_API_KEY
    secret: GEMINI_API_KEY
    availability:
      - RUNTIME
