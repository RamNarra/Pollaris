      - 'NEXT_PUBLIC_FIREBASE_APP_ID=1:803271817886:web:6d3bb7829a1b22a1e7998f'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=G-NT0CWBFWK0'
