      - 'NEXT_PUBLIC_FIREBASE_PROJECT_ID=pollaris-497520'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=pollaris-497520.firebasestorage.app'
